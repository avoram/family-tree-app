<mat-toolbar color="primary">
  <span>Family Tree</span>
</mat-toolbar>

<main class="main-content">
  <mat-card class="controls-card">
    <mat-card-content>
      <app-tree-selection (treeSelected)="onTreeSelected($event)" />
    </mat-card-content>
  </mat-card>

  <section class="tree-area" aria-label="Family tree visualization">
    @if (selectedTree(); as tree) {
      <app-tree-visualization [tree]="tree" />
    } @else {
      <p class="placeholder-text">Tree visualization will appear here.</p>
    }
  </section>
</main>
